<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ERP Cloud — Vendor Management">
    <title>Vendors — ERP Cloud</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="animated-bg"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main -->
        <div class="main-content">
            <!-- Navbar -->
            <div id="navbar-container"></div>

            <!-- Page Content -->
            <div class="page-content">

                <!-- Page Header -->
                <div class="flex items-center justify-between mb-3">
                    <div>
                        <h1 style="font-size:24px; font-weight:800;">Vendors</h1>
                        <p class="text-muted text-sm">Manage and track all vendors</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAddVendorModal()">
                        <i class="fas fa-plus"></i> Add Vendor
                    </button>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <div class="table-header">
                        <h3><i class="fas fa-store" style="margin-right:8px; color:var(--primary)"></i>All Vendors</h3>
                        <div class="table-actions">
                            <div class="search-wrapper">
                                <i class="fas fa-search"></i>
                                <input type="text" class="search-input" id="vendorSearch" placeholder="Search by name...">
                            </div>
                        </div>
                    </div>

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Vendor Name</th>
                                <th>Contact</th>
                                <th>Email</th>
                                <th>GST Number</th>
                                <th>Rating</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vendorTableBody">
                            <tr>
                                <td colspan="7" class="text-center text-muted" style="padding:32px 0;">
                                    <i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i> Loading vendors...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Vendor Modal -->
    <div id="vendorModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Vendor</h2>
                <button class="modal-close" onclick="closeVendorModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="modal-body">
                <form id="vendorForm">
                    <div class="form-group">
                        <label for="vendorName">Vendor Name *</label>
                        <input type="text" id="vendorName" name="name" required placeholder="e.g., FreshMart Distributors">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="vendorContact">Contact</label>
                            <input type="tel" id="vendorContact" name="contact" placeholder="e.g., +1-555-1101">
                        </div>
                        <div class="form-group">
                            <label for="vendorEmail">Email</label>
                            <input type="email" id="vendorEmail" name="email" placeholder="e.g., vendor@example.com">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="vendorGST">GST Number</label>
                            <input type="text" id="vendorGST" name="gst_number" placeholder="e.g., 27AAACF1234B1ZK">
                        </div>
                        <div class="form-group">
                            <label for="vendorRating">Rating</label>
                            <div class="flex items-center gap-2">
                                <input type="range" id="vendorRating" name="rating" min="0" max="5" step="0.1" value="0" style="flex:1;">
                                <span id="ratingValue" style="min-width:30px;">0.0</span>
                                <i class="fas fa-star" style="color:#fbbf24;"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="vendorAddress">Address</label>
                        <textarea id="vendorAddress" name="address" rows="3" placeholder="Vendor address..."></textarea>
                    </div>

                    <div style="margin-top:24px; display:flex; gap:12px; justify-content:flex-end;">
                        <button type="button" class="btn btn-secondary" onclick="closeVendorModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">Add Vendor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/app.js"></script>
    <script>
        let currentVendorId = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            if (!requireAuth()) return;
            initApp('Vendors');
            loadVendors();

            // Setup search
            document.getElementById('vendorSearch').addEventListener('input', debounce(searchVendors, 300));

            // Setup rating slider
            document.getElementById('vendorRating').addEventListener('input', function(e) {
                document.getElementById('ratingValue').textContent = parseFloat(e.target.value).toFixed(1);
            });

            // Setup form submit
            document.getElementById('vendorForm').addEventListener('submit', saveVendor);
        });

        async function loadVendors() {
            try {
                const vendors = await apiGet('/api/vendors?limit=500');
                displayVendors(vendors || []);
            } catch (error) {
                showToast('Failed to load vendors: ' + error.message, 'error');
            }
        }

        function displayVendors(vendors) {
            const tbody = document.getElementById('vendorTableBody');
            if (!vendors.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center text-muted" style="padding:32px 0;">
                            <i class="fas fa-inbox" style="margin-right:8px; font-size:20px;"></i> No vendors yet
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = vendors.map(v => `
                <tr>
                    <td><strong>${escapeHtml(v.name)}</strong></td>
                    <td>${v.contact ? escapeHtml(v.contact) : '—'}</td>
                    <td>${v.email ? escapeHtml(v.email) : '—'}</td>
                    <td>${v.gst_number ? escapeHtml(v.gst_number) : '—'}</td>
                    <td>
                        <div style="display:flex; align-items:center; gap:4px;">
                            <span>${parseFloat(v.rating).toFixed(1)}</span>
                            <i class="fas fa-star" style="color:#fbbf24; font-size:12px;"></i>
                        </div>
                    </td>
                    <td>${v.is_active ? '<span class="status-badge active">Active</span>' : '<span class="status-badge inactive">Inactive</span>'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-icon" title="Edit" onclick="editVendor(${v.vendor_id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-icon btn-danger" title="Delete" onclick="deleteVendor(${v.vendor_id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function searchVendors(e) {
            const query = e.target.value.trim();
            if (!query) {
                loadVendors();
                return;
            }
            
            // Client-side search from already loaded data
            const rows = document.querySelectorAll('#vendorTableBody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
            });
        }

        function openAddVendorModal() {
            currentVendorId = null;
            document.getElementById('vendorForm').reset();
            document.getElementById('modalTitle').textContent = 'Add Vendor';
            document.getElementById('submitBtn').textContent = 'Add Vendor';
            document.getElementById('vendorRating').value = 0;
            document.getElementById('ratingValue').textContent = '0.0';
            document.getElementById('vendorModal').style.display = 'flex';
        }

        async function editVendor(vendorId) {
            try {
                const vendor = await apiGet(`/api/vendors/${vendorId}`);
                currentVendorId = vendorId;
                
                document.getElementById('vendorName').value = vendor.name;
                document.getElementById('vendorContact').value = vendor.contact || '';
                document.getElementById('vendorEmail').value = vendor.email || '';
                document.getElementById('vendorGST').value = vendor.gst_number || '';
                document.getElementById('vendorAddress').value = vendor.address || '';
                document.getElementById('vendorRating').value = vendor.rating || 0;
                document.getElementById('ratingValue').textContent = parseFloat(vendor.rating || 0).toFixed(1);
                
                document.getElementById('modalTitle').textContent = 'Edit Vendor';
                document.getElementById('submitBtn').textContent = 'Update Vendor';
                document.getElementById('vendorModal').style.display = 'flex';
            } catch (error) {
                showToast('Failed to load vendor: ' + error.message, 'error');
            }
        }

        function closeVendorModal() {
            document.getElementById('vendorModal').style.display = 'none';
            currentVendorId = null;
        }

        async function saveVendor(e) {
            e.preventDefault();
            
            const formData = new FormData(document.getElementById('vendorForm'));
            const data = {
                name: formData.get('name'),
                contact: formData.get('contact') || null,
                email: formData.get('email') || null,
                gst_number: formData.get('gst_number') || null,
                address: formData.get('address') || null,
                rating: parseFloat(formData.get('rating')) || 0,
            };

            try {
                showSpinner();
                if (currentVendorId) {
                    await apiPut(`/api/vendors/${currentVendorId}`, data);
                    showToast('Vendor updated successfully', 'success');
                } else {
                    await apiPost('/api/vendors', data);
                    showToast('Vendor added successfully', 'success');
                }
                closeVendorModal();
                loadVendors();
            } catch (error) {
                showToast('Error saving vendor: ' + error.message, 'error');
            } finally {
                hideSpinner();
            }
        }

        async function deleteVendor(vendorId) {
            if (!confirm('Are you sure you want to delete this vendor? This will soft-delete the vendor.')) return;

            try {
                showSpinner();
                await apiDelete(`/api/vendors/${vendorId}`);
                showToast('Vendor deleted successfully', 'success');
                loadVendors();
            } catch (error) {
                showToast('Error deleting vendor: ' + error.message, 'error');
            } finally {
                hideSpinner();
            }
        }

        function debounce(func, delay) {
            let timeoutId;
            return function(...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

    <style>
        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            color: var(--primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 4px;
        }

        .btn-icon.btn-danger {
            color: #ef4444;
        }

        .btn-icon.btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
            padding: 4px;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</body>
</html>
