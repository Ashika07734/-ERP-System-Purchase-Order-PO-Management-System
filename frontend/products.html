<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ERP Cloud — Products Management">
    <title>Products — ERP Cloud</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="animated-bg"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main -->
        <div class="main-content">
            <!-- Navbar -->
            <div id="navbar-container"></div>

            <!-- Page Content -->
            <div class="page-content">

                <!-- Page Header -->
                <div class="flex items-center justify-between mb-3">
                    <div>
                        <h1 style="font-size:24px; font-weight:800;">Products Database</h1>
                        <p class="text-muted text-sm">Manage inventory and AI-generate product details</p>
                    </div>
                </div>

                <!-- Add Product Section -->
                <div class="glass-card mb-3 padding-4" style="background: linear-gradient(135deg, rgba(99,102,241,0.05), rgba(6,182,212,0.05));">
                    <h3 style="font-size:16px; font-weight:700; margin-bottom:20px;">
                        <i class="fas fa-magic" style="color:var(--primary); margin-right:8px;"></i>
                        Add New Product (with AI Auto-Description)
                    </h3>
                    <form onsubmit="submitProduct(event)" id="productForm">
                        <div class="form-row">
                            <div class="form-group" style="flex:2">
                                <label class="form-label">Product Name *</label>
                                <input type="text" class="form-control" id="productName" required placeholder="e.g. Basmati Rice 25kg">
                            </div>
                            <div class="form-group" style="flex:1">
                                <label class="form-label">Category</label>
                                <select class="form-control" id="productCategory" required>
                                    <option value="">— Select Category —</option>
                                    <option>Rice</option>
                                    <option>Flour</option>
                                    <option>Oil</option>
                                    <option>Snacks</option>
                                    <option>Beverages</option>
                                    <option>Dairy</option>
                                    <option>Spices</option>
                                    <option>Frozen Foods</option>
                                    <option>Cleaning Products</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex:1">
                                <label class="form-label">Unit Price ($) *</label>
                                <input type="number" class="form-control" id="productPrice" step="0.01" required value="0.00">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Brand Name</label>
                                <input type="text" class="form-control" id="productBrand" placeholder="e.g. Aashirvaad">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Unit Type</label>
                                <select class="form-control" id="productUnitType">
                                    <option value="">— Select Unit —</option>
                                    <option>Kg</option>
                                    <option>Gram</option>
                                    <option>Liter</option>
                                    <option>Packet</option>
                                    <option>Box</option>
                                    <option>Carton</option>
                                    <option>Bottle</option>
                                    <option>Bag</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Expiry Date</label>
                                <input type="date" class="form-control" id="productExpiryDate">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Batch Number</label>
                                <input type="text" class="form-control" id="productBatchNumber" placeholder="e.g. RICE-APR26-B12">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Minimum Stock Level</label>
                                <input type="number" class="form-control" id="productMinimumStock" min="0" value="10">
                            </div>
                            <div class="form-group">
                                <label class="form-label">GST Rate</label>
                                <select class="form-control" id="productGstRate">
                                    <option value="5">5%</option>
                                    <option value="12">12%</option>
                                    <option value="18">18%</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group" style="margin-top: 10px;">
                            <label class="form-label">Description</label>
                            <div style="display:flex; gap:10px;">
                                <textarea class="form-control" id="productDescription" rows="3" placeholder="Click 'Auto-Generate' to let AI write a professional description..." style="flex:1;"></textarea>
                                <button type="button" class="btn btn-primary" onclick="generateDescription()" id="aiBtn" style="height: fit-content;">
                                    <i class="fas fa-sparkles"></i> Auto-Generate
                                </button>
                            </div>
                        </div>

                        <div style="display:flex; justify-content:flex-end; margin-top:16px;">
                            <button type="submit" class="btn btn-success">Save Product</button>
                        </div>
                    </form>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <div class="table-header">
                        <h3><i class="fas fa-boxes-stacked" style="margin-right:8px; color:var(--primary)"></i>Product Catalog</h3>
                        <button class="btn btn-sm btn-secondary" onclick="loadProductTable()">Refresh</button>
                    </div>
                    <div class="form-row" style="padding: 0 20px 20px;">
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">Search</label>
                            <input type="text" id="productSearch" class="form-control" placeholder="Search by product name or SKU" oninput="loadProductTable()">
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">Filter by Category</label>
                            <select id="filterCategory" class="form-control" onchange="loadProductTable()">
                                <option value="">All Categories</option>
                                <option>Rice</option>
                                <option>Flour</option>
                                <option>Oil</option>
                                <option>Snacks</option>
                                <option>Beverages</option>
                                <option>Dairy</option>
                                <option>Spices</option>
                                <option>Frozen Foods</option>
                                <option>Cleaning Products</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">Filter by Brand</label>
                            <input type="text" id="filterBrand" class="form-control" placeholder="e.g. Fortune" oninput="loadProductTable()">
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">Expiry Before</label>
                            <input type="date" id="filterExpiry" class="form-control" onchange="loadProductTable()">
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Brand</th>
                                <th>Unit</th>
                                <th>Expiry</th>
                                <th>Batch</th>
                                <th>Price</th>
                                <th>Stock</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            <tr>
                                <td colspan="9" class="text-center text-muted" style="padding:40px">
                                    <div class="spinner spinner-inline"></div> Loading...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/po.js"></script>
    <script>
        async function loadProductTable() {
            await loadProductCatalogWithFilters();
        }

        async function generateDescription() {
            const name = document.getElementById('productName').value;
            const category = document.getElementById('productCategory').value;
            const btn = document.getElementById('aiBtn');
            const desc = document.getElementById('productDescription');

            if (!name) {
                showToast('Please enter a product name first', 'warning');
                document.getElementById('productName').focus();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Generating...';

            try {
                // Call the existing backend endpoint for AI description
                const result = await apiPost('/api/products/ai-description', {
                    product_name: name,
                    category: category || 'General'
                });
                
                if (result.description) {
                    desc.value = result.description;
                    showToast('AI description generated successfully!', 'success');
                } else {
                    showToast('AI generation returned empty', 'warning');
                }
            } catch (error) {
                showToast('AI generation failed: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sparkles"></i> Auto-Generate';
            }
        }

        async function submitProduct(e) {
            e.preventDefault();
            const name = document.getElementById('productName').value;
            const category = document.getElementById('productCategory').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const brand = document.getElementById('productBrand').value;
            const unitType = document.getElementById('productUnitType').value;
            const expiryDate = document.getElementById('productExpiryDate').value;
            const batchNumber = document.getElementById('productBatchNumber').value;
            const minimumStock = parseInt(document.getElementById('productMinimumStock').value) || 10;
            const gstRate = parseFloat(document.getElementById('productGstRate').value) || 5;
            const desc = document.getElementById('productDescription').value;

            // Generate a random SKU like SKU-1234
            const randSku = 'SKU-' + Math.floor(1000 + Math.random() * 9000);

            try {
                showSpinner();
                await apiPost('/api/products', {
                    name: name,
                    sku: randSku,
                    category: category,
                    brand: brand,
                    unit_type: unitType,
                    expiry_date: expiryDate || null,
                    batch_number: batchNumber,
                    minimum_stock: minimumStock,
                    gst_rate: gstRate,
                    unit_price: price,
                    description: desc
                });
                showToast('Product added successfully!', 'success');
                document.getElementById('productForm').reset();
                loadProductTable();
            } catch (err) {
                showToast('Failed to add product', 'error');
            } finally {
                hideSpinner();
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!requireAuth()) return;
            await initApp('Products');
            await loadProductTable();
        });
    </script>
</body>
</html>
